<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Léolo Edición | Poesía & Eventos</title>
  <meta name="description" content="Léolo Edición — Espacio literario de poesía, eventos y comunidad. Descubre voces, asiste a veladas y comparte tu escritura."/>
  <meta name="theme-color" content="#f7f3ec"/>

  <meta property="og:title"       content="Léolo Edición | Poesía & Eventos"/>
  <meta property="og:description" content="Espacio literario de poesía, eventos y comunidad."/>
  <meta property="og:type"        content="website"/>
  <meta property="og:locale"      content="es_ES"/>
  <meta property="og:url"         content="https://leolo-edicion.es"/>
  <meta property="og:image"       content="https://leolo-edicion.es/img/og-cover.jpg"/>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="css/styles.css"/>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    #leolo-loader {
      position: fixed;
      inset: 0;
      background: #f7f3ec;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      gap: 20px;
    }
    .loader-logo {
      font-family: 'Pinyon Script', cursive;
      font-size: 4rem;
      color: #2a2a2a;
      animation: loaderPulse 1.6s ease-in-out infinite;
    }
    .loader-bar {
      width: 120px;
      height: 1px;
      background: rgba(42,42,42,0.12);
      position: relative;
      overflow: hidden;
    }
    .loader-bar::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%;
      height: 100%;
      background: #b8965a;
      animation: loaderSlide 1.4s ease-in-out infinite;
    }
    @keyframes loaderPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }
    @keyframes loaderSlide {
      0%   { left: -100%; }
      100% { left: 100%; }
    }
    .page {
      display: none;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }
    .page.active {
      display: block;
    }
  </style>
</head>

<body>

  <!-- ✅ CURSOR — primero en el body, antes de todo -->
  <div class="cursor"          aria-hidden="true"></div>
  <div class="cursor-follower" aria-hidden="true"></div>

  <!-- ===== LOADER ===== -->
  <div id="leolo-loader" aria-hidden="true">
    <span class="loader-logo">Léolo</span>
    <div class="loader-bar" aria-hidden="true"></div>
  </div>

  <!-- ===== Componentes comunes ===== -->
  <div id="common-components"></div>

  <!-- ===== Contenedor de páginas ===== -->
  <main id="page-container" role="main" aria-live="polite" aria-atomic="false"></main>

  <!-- ===== SCRIPTS ===== -->
  <script>
    async function loadHTML(url, containerId, append = false) {
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status} al cargar ${url}`);
        const html = await response.text();
        const el   = document.getElementById(containerId);
        if (!el) throw new Error(`Contenedor #${containerId} no encontrado`);
        if (append) {
          el.innerHTML += html;
        } else {
          el.innerHTML = html;
        }
      } catch (error) {
        console.error(`❌ loadHTML(${url}):`, error);
      }
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const script   = document.createElement('script');
        script.src     = src;
        script.onload  = resolve;
        script.onerror = () => reject(new Error(`❌ Error cargando script: ${src}`));
        document.body.appendChild(script);
      });
    }

    function showLoader() {
      const loader = document.getElementById('leolo-loader');
      if (loader) {
        loader.style.display    = 'flex';
        loader.style.opacity    = '1';
        loader.style.transition = '';
      }
    }

    function hideLoader() {
      const loader = document.getElementById('leolo-loader');
      if (!loader) return;
      loader.style.opacity    = '0';
      loader.style.transition = 'opacity 0.5s ease';
      setTimeout(() => { loader.style.display = 'none'; }, 520);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      showLoader();

      try {
        await loadHTML('components/common.html', 'common-components');
        await loadHTML('pages/home.html',        'page-container', true);
        await loadHTML('pages/events.html',      'page-container', true);
        await loadHTML('pages/community.html',   'page-container', true);

        await loadScript('js/events.js');
        await loadScript('js/main.js');

        if (typeof showPage === 'function') showPage('page1');

        const main = document.getElementById('page-container');
        if (main) main.setAttribute('aria-busy', 'false');

      } catch (err) {
        console.error('❌ Error en la inicialización:', err);
        document.body.innerHTML += `
          <div style="position:fixed;inset:0;display:flex;align-items:center;
            justify-content:center;background:#f7f3ec;z-index:99998;
            font-family:Inter,sans-serif;font-size:0.9rem;color:#2a2a2a;
            flex-direction:column;gap:12px;text-align:center;padding:24px;">
            <span style="font-size:2rem">✦</span>
            <strong>Léolo Edición</strong>
            <p style="color:#888;font-weight:300">
              Algo salió mal al cargar la página.<br>
              Por favor, recarga o inténtalo más tarde.
            </p>
            <button onclick="location.reload()"
              style="padding:10px 24px;border:1px solid #b8965a;
              background:transparent;color:#b8965a;cursor:pointer;
              font-family:Inter,sans-serif;letter-spacing:1px;font-size:0.75rem">
              RECARGAR
            </button>
          </div>`;
      } finally {
        hideLoader();
      }
    });
  </script>

</body>
</html>
